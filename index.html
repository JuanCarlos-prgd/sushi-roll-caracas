<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi Roll Caracas | Sushi Experience</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">SUSHI ROLL <span>CARACAS</span></div>
            <ul class="nav-links">
                <li><a href="#menu">Menú</a></li>
                <li><a href="#reserva">Reservas</a></li>
                <li><a href="#ubicacion">Ubicación</a></li>
            </ul>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 <span id="cart-count">0</span>
            </div>
        </nav>
    </header>

    <section class="hero">
        <h1>Gastronomía Japonesa de Autor</h1>
    </section>

    <section id="menu">
        <h2 class="section-title">Nuestro Menú</h2>
        <div id="menu-grid"></div>
    </section>

    <section id="reserva">
        <div class="reserva-container">
            <h2>Reserva tu Mesa</h2>
            <form id="reserva-form">
                <input type="text" placeholder="Nombre completo" required>
                <input type="date" required>
                <input type="time" required>
                <select>
                    <option value="1">1 Persona</option>
                    <option value="2">2 Personas</option>
                    <option value="4">4 Personas</option>
                </select>
                <button type="submit">Confirmar Reserva</button>
            </form>
        </div>
    </section>

    <section id="ubicacion">
        <h2>Encuéntranos</h2>
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d62758.55325852277!2d-66.93043815136719!3d10.48858970000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8c2a58adcd8240a9%3A0x882ef13db054e88a!2sCaracas%2C%20Distrito%20Capital!5e0!3m2!1ses-419!2sve!4v1700000000000!5m2!1ses-419!2sve" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

    <aside id="side-cart" class="cart-hidden">
        <div class="cart-header">
            <h2>Pedido Online</h2>
            <button onclick="toggleCart()">✕</button>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <h3>Total: $<span id="total-price">0</span></h3>
            <button id="checkout-btn" onclick="startCheckout()">Pagar con Mercado Pago</button>
        </div>
    </aside>

    <footer>
        <p>&copy; 2026 SUSHI ROLL CARACAS</p>
        <div class="footer-social">
            <a href="https://github.com" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub" width="30">
            </a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
