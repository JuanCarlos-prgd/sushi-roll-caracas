<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi Roll Caracas | Sushi Experience</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">SUSHI ROLL <span>CARACAS</span></div>
            <ul class="nav-links">
                <li><a href="#menu">Menú</a></li>
                <li><a href="#reserva">Reservas</a></li>
            </ul>
                <div class="cart-icon" onclick="toggleCart()">
            <div class="cart-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="feather-cart">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span id="cart-count">0</span>
    </div>
</div>
        </nav>
    </header>

    <section class="hero">
    </section>

    <section id="menu">
        <h2 class="section-title">Nuestro Menú</h2>
        <div id="menu-grid"></div>
    </section>

    <section id="reserva">
    <div class="reserva-card">
        <div class="reserva-info">
            <h2>Reserva tu Experiencia</h2>
            <p>Disfruta de la mejor gastronomía japonesa de autor en Caracas.</p>
        </div>
        <form id="reserva-form">
            <div class="form-group-row">
                <input type="text" placeholder="👤 Nombre completo" required>
                <select>
                    <option value="1">👥 1 Persona</option>
                    <option value="2">👥 2 Personas</option>
                    <option value="4">👥 4 Personas</option>
                    <option value="6">👥 6+ Personas</option>
                </select>
            </div>
            <div class="form-group-row">
                <input type="date" required>
                <input type="time" required>
            </div>
            <button type="submit" class="btn-reserva">Confirmar Mesa</button>
        </form>
    </div>
</section>

    <div id="payment-modal" class="modal-hidden">
    <div class="modal-content">
        <span class="close-modal" onclick="closePaymentModal()">×</span>
        <h2>Simulación de Pago (C2P)</h2>
        <p id="amount-to-pay"></p>
        
        <form id="simulated-payment-form">
            <select id="sim-bank" required>
                <option value="">Seleccione su banco</option>
                <option value="0102">Banco de Venezuela</option>
                <option value="0105">Mercantil</option>
                <option value="0108">Provincial</option>
            </select>
            <input type="text" id="sim-phone" placeholder="Teléfono (Ej: 04121234567)" required>
            <input type="text" id="sim-id" placeholder="Cédula (Ej: V12345678)" required>
            <input type="password" id="sim-otp" placeholder="Clave dinámica (OTP)" required>
            <button type="submit" id="confirm-pay-btn">Confirmar Pago</button>
        </form>

        <div id="payment-result" class="hidden">
            </div>
    </div>
</div>

    <section id="ubicacion">
        <h2>Encuéntranos</h2>
        <div class="map-container">
<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3923.334498757669!2d-66.9522003!3d10.4742751!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8c2a5f1c6ce1a2d3%3A0x6e16f51be0e743a2!2sSushi%20Roll%20Caracas!5e0!3m2!1ses!2sve!4v1775600274815!5m2!1ses!2sve" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

    <aside id="side-cart" class="cart-hidden">
        <div class="cart-header">
            <h2>Pedido Online</h2>
            <button onclick="toggleCart()">✕</button>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <h3>Total: $<span id="total-price">0</span></h3>
            <button id="checkout-btn" onclick="startCheckout()">Realizar pago</button>
        </div>
    </aside>


    <footer>
        <p>&copy; 2026 SUSHI ROLL CARACAS</p>
        <div class="Link-container"> </div>

            <a href="https://github.com/JuanCarlos-prgd" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Link to my GitHub" width="30">
            </a>
    </footer>

    <button id="theme-toggle" class="fab-theme" onclick="toggleTheme()">
    <span id="theme-icon">🌙</span>
</button>

    <script src="script.js"></script>
</body>
</html>
